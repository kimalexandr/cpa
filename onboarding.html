<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Онбординг — RealCPA Hub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard-page fact-theme">
  <main class="container" style="padding:40px 0;">
    <h1>Быстрый старт в 3 шага</h1>
    <div class="dashboard-block" style="margin-bottom:12px;">
      <div id="onboardingProgressText">Прогресс: 0/3</div>
      <div style="height:8px;background:#1e293b;border-radius:999px;overflow:hidden;margin-top:8px;">
        <div id="onboardingProgressBar" style="height:100%;width:0%;background:#2563eb;"></div>
      </div>
    </div>
    <div id="onboardingSteps" class="connections-cards"></div>
    <div style="margin-top:16px;">
      <button id="onboardingDoneBtn" class="btn btn-primary" type="button">Сделать следующий шаг</button>
    </div>
  </main>
  <script src="api.js"></script>
  <script>
  (function() {
    if (!window.RealCPA || !window.RealCPA.isLoggedIn()) { window.location.href = 'login.html'; return; }
    var role = (new URLSearchParams(window.location.search)).get('role') || window.RealCPA.getRole() || 'affiliate';
    var wrap = document.getElementById('onboardingSteps');
    var nextActionLink = role === 'supplier' ? 'dashboard-supplier.html' : 'dashboard-affiliate.html';
    function renderFromProgress(progress) {
      var done = progress && progress.done ? progress.done : 0;
      var total = progress && progress.total ? progress.total : 3;
      var steps = progress && Array.isArray(progress.steps) ? progress.steps : [];
      var pct = total ? Math.round(done * 100 / total) : 0;
      var text = document.getElementById('onboardingProgressText');
      var bar = document.getElementById('onboardingProgressBar');
      if (text) text.textContent = 'Прогресс: ' + done + '/' + total;
      if (bar) bar.style.width = pct + '%';
      wrap.innerHTML = steps.map(function(it, idx) {
        var mark = it.done ? ' <span class="offer-badge offer-badge-approved">Готово</span>' : '';
        if (!it.done && !nextActionLink) nextActionLink = it.actionLink;
        return '<div class="connection-card"><div class="connection-card-header"><h2 class="connection-card-title">' + (idx + 1) + ') ' + it.title + mark + '</h2><a class="btn btn-sm btn-primary" href="' + it.actionLink + '">' + (it.done ? 'Проверить' : 'Сделать') + '</a></div></div>';
      }).join('');
      var firstPending = steps.find(function(s) { return !s.done; });
      nextActionLink = firstPending ? firstPending.actionLink : (role === 'supplier' ? 'dashboard-supplier.html' : 'dashboard-affiliate.html');
      var btn = document.getElementById('onboardingDoneBtn');
      if (btn) btn.textContent = firstPending ? 'Сделать следующий шаг' : 'Перейти в кабинет';
    }
    if (window.RealCPA.onboardingProgress) {
      window.RealCPA.onboardingProgress().then(renderFromProgress).catch(function() {});
    }
    document.getElementById('onboardingDoneBtn').addEventListener('click', function() {
      try { localStorage.setItem('onboarding_' + role + '_done', '1'); } catch (e) {}
      window.location.href = nextActionLink || (role === 'supplier' ? 'dashboard-supplier.html' : 'dashboard-affiliate.html');
    });
  })();
  </script>
</body>
</html>
