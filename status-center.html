<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Центр статусов — RealCPA Hub</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-page fact-theme">
    <header class="header">
        <div class="container"><div class="header-content"><div class="logo"><i class="fas fa-link"></i><a href="index.html" class="logo-link">RealCPA Hub</a></div><nav class="nav"><a href="dashboard-affiliate.html" class="nav-link">Кабинет партнёра</a><a href="offers.html" class="nav-link">Офферы</a></nav></div></div>
    </header>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <a href="dashboard-affiliate.html" class="sidebar-link"><i class="fas fa-home"></i><span>Главная</span></a>
                <a href="offers.html" class="sidebar-link"><i class="fas fa-th-large"></i><span>Каталог офферов</span></a>
                <a href="dashboard-affiliate-connections.html" class="sidebar-link"><i class="fas fa-link"></i><span>Мои подключения</span></a>
                <a href="status-center.html" class="sidebar-link active"><i class="fas fa-list-check"></i><span>Центр статусов</span></a>
            </nav>
        </aside>
        <main class="dashboard-main">
            <div class="dashboard-header"><h1>Центр статусов и причин</h1></div>
            <div id="statusCenterList" class="connections-cards"><p class="loading-offers">Загрузка...</p></div>
        </main>
    </div>
    <script src="api.js"></script>
    <script src="script.js"></script>
    <script>
    (function () {
        if (!window.RealCPA || !window.RealCPA.isLoggedIn() || window.RealCPA.getRole() !== 'affiliate') {
            window.location.href = 'login.html?redirect=' + encodeURIComponent('status-center.html');
            return;
        }
        var wrap = document.getElementById('statusCenterList');
        function esc(s) { var d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }
        function statusLabel(s) {
            if (s === 'approved') return 'Одобрено';
            if (s === 'pending') return 'На модерации';
            if (s === 'rejected') return 'Отклонено';
            if (s === 'blocked') return 'Заблокировано';
            return s || '—';
        }
        window.RealCPA.statusCenter().then(function(resp) {
            var list = resp && Array.isArray(resp.items) ? resp.items : [];
            if (!list.length) { wrap.innerHTML = '<p class="offers-empty-msg">Пока нет статусов подключений.</p>'; return; }
            wrap.innerHTML = list.map(function(p) {
                var reason = p.reason ? '<div class="connection-meta-row"><span class="connection-meta-label">Причина</span><span class="connection-meta-value">' + esc(p.reason) + '</span></div>' : '';
                var nextStep = p.nextStep ? '<div class="connection-meta-row"><span class="connection-meta-label">Что делать дальше</span><span class="connection-meta-value">' + esc(p.nextStep) + '</span></div>' : '';
                var action = p.retryAllowed ? '<a class="btn btn-sm btn-primary" href="' + esc(p.actionLink || ('offer.html?id=' + p.offerId)) + '">Исправить и подать снова</a>' : '';
                return '<div class="connection-card"><div class="connection-card-header"><h2 class="connection-card-title">' + esc(p.offerTitle || p.offerId || '—') + '</h2><span class="connection-status-badge">' + esc(statusLabel(p.status)) + '</span></div><div class="connection-meta">' + reason + nextStep + '</div>' + action + '</div>';
            }).join('');
        }).catch(function() {
            wrap.innerHTML = '<p class="offers-empty-msg">Не удалось загрузить центр статусов.</p>';
        });
    })();
    </script>
</body>
</html>
